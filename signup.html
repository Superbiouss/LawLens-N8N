<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Early Access — LAWLENS</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./src/index.css" />
    <link rel="stylesheet" href="css/landing.css" />
</head>
<body class="auth-page">

    <!-- Theme toggle positioned top right for utility -->
    <div style="position: absolute; top: 24px; right: 24px;">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark mode">
            <!-- Moon (light mode) -->
            <svg aria-hidden="true" class="icon-moon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <!-- Sun (dark mode) -->
            <svg aria-hidden="true" class="icon-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
        </button>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo" aria-label="Return to homepage">
                <div class="logo-dot" aria-hidden="true">
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
            </a>
            <h1>Request Early Access</h1>
            <p>Join the waitlist to try LAWLENS's contract intelligence platform.</p>
        </div>

        <form class="auth-form" action="#" autocomplete="on">
            <div style="display: flex; gap: 16px;">
                <div class="form-group" style="flex: 1;">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" required placeholder="Jane" />
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" required placeholder="Doe" />
                </div>
            </div>

            <div class="form-group">
                <label for="org">Organization</label>
                <input type="text" id="org" name="org" required placeholder="Company or Law Firm" />
            </div>

            <div class="form-group">
                <label for="email">Work Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@lawfirm.com" />
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Join Waitlist</button>
            <p style="text-align: center; font-size: 11px; color: var(--color-text-tertiary); margin-top: 8px;">
                By signing up, you agree to our <a href="terms.html" style="color: var(--color-brand-purple); text-decoration: underline;">Terms</a> and <a href="privacy.html" style="color: var(--color-brand-purple); text-decoration: underline;">Privacy Policy</a>.
            </p>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const form = document.querySelector('.auth-form');
        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<svg class="spinner" viewBox="0 0 50 50" style="width: 18px; height: 18px; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px;"><circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="currentColor"></circle></svg> Creating account...`;
                btn.style.opacity = '0.8';
                btn.style.pointerEvents = 'none';
                setTimeout(() => {
                    window.location.href = '/app/';
                }, 1200);
            });
        }
    </script>
    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner .path { stroke-dasharray: 90, 150; stroke-dashoffset: 0; animation: dash 1.5s ease-in-out infinite; stroke-linecap: round; }
        @keyframes dash { 0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; } 50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; } 100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; } }
    </style>
</body>
</html>
