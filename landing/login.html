<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — LAWLENS</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../src/index.css" />
    <link rel="stylesheet" href="css/landing.css" />
</head>
<body class="auth-page">

    <!-- Theme toggle positioned top right for utility -->
    <div style="position: absolute; top: 24px; right: 24px;">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark mode">
            <!-- Moon (light mode) -->
            <svg aria-hidden="true" class="icon-moon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <!-- Sun (dark mode) -->
            <svg aria-hidden="true" class="icon-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
        </button>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo" aria-label="Return to homepage">
                <div class="logo-dot" aria-hidden="true">
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
            </a>
            <h1>Welcome back</h1>
            <p>Log in to access your Legal Intelligence dashboard.</p>
        </div>

        <form class="auth-form" action="#" autocomplete="on">
            <div class="form-group">
                <label for="email">Work Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@lawfirm.com" />
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
            </div>
            
            <div style="text-align: right; margin-top: -8px; margin-bottom: 8px;">
                <a href="#" style="font-size: 13px; color: var(--color-brand-purple); font-weight: 500;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
        </form>

        <div class="auth-divider">or continue with</div>

        <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary" style="width: 100%;" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24" style="width: 16px; height: 16px;"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </button>
            <button class="btn btn-secondary" style="width: 100%;" type="button">
                <svg aria-hidden="true" viewBox="0 0 21 21" style="width: 16px; height: 16px;"><path fill="#f25022" d="M1 1h9v9H1z"/><path fill="#00a4ef" d="M1 11h9v9H1z"/><path fill="#7fba00" d="M11 1h9v9h-9z"/><path fill="#ffb900" d="M11 11h9v9h-9z"/></svg>
                Microsoft
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Request access</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
